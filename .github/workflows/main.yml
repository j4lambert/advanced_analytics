# .github/workflows/main.yml
name: Build Release ZIP

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'

jobs:
  build:
    if: startsWith(github.event.head_commit.message, '[RELEASE]') || startsWith(github.event.head_commit.message, '[PRE-RELEASE]')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: Extract version and release type
        id: meta
        run: |
          MSG="${{ github.event.head_commit.message }}"
          VERSION=$(echo "$MSG" | grep -oP '\d+\.\d+\.\d+')
          if echo "$MSG" | grep -q '^\[PRE-RELEASE\]'; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          BODY=$(echo "$MSG" | sed -E 's/^\[(PRE-)?RELEASE\] [0-9]+\.[0-9]+\.[0-9]+ ?//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT

      - name: Build ZIP
        run: |
          zip -r advanced_analytics-v${{ steps.meta.outputs.version }}.zip manifest.json dist/

      - name: Create GitHub Release + upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          body: ${{ steps.meta.outputs.body }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            advanced_analytics-v${{ steps.meta.outputs.version }}.zip
            manifest.json